embedding:
  provider: qwen
  model: text-embedding-v4
  dimension: 1024

storage:
  backend: pgvector
  pgvector:
    database_url: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/trusted_qa
    embedding_dim: 1024
  local_dev:
    enabled: false
    database_url: sqlite:///database/local_dev.db
