app:
  name: Trusted-Question-Answering-Agent
  env: dev
  timezone: Asia/Singapore
environment:
  name: dev
database:
  bootstrap_on_startup: false
db:
  backend: pgvector
  async_session: true
llm:
  provider: deepseek
  current_model: deepseek-deepseek-v4-flash
  model: deepseek-v4-flash
  api_key: ""
  base_url: https://api.deepseek.com/v1
  api_key_env: DEEPSEEK_API_KEY
  base_url_env: DEEPSEEK_BASE_URL
  temperature: 0.2
  max_tokens: 2048
  enable_real_generation: true
  timeout_seconds: 35
  max_retries: 0
  client_mode: direct
  providers:
    anyrouter:
      base_url: https://anyrouter.top/v1
      anthropic_base_url: https://anyrouter.top/v1
      api_key_env: ANYROUTER_API_KEY
      use_responses_api: true
      http_proxy: http://127.0.0.1:7897
      https_proxy: http://127.0.0.1:7897
      no_proxy: 127.0.0.1,localhost
      models:
        gpt-5.5:
          model: gpt-5.5
          use_responses_api: true
        gpt-5-codex:
          model: gpt-5-codex
          use_responses_api: true
      api_key: ""
    rightcode:
      base_url: https://www.right.codes/codex/v1
      anthropic_base_url: https://www.right.codes/codex/v1
      api_key_env: RIGHTCODE_API_KEY
      use_responses_api: false
      client_mode: direct
      timeout_seconds: 35
      max_retries: 0
      models:
        gpt-5.4-mini:
          model: gpt-5.4-mini
    deepseek:
      base_url: https://api.deepseek.com/v1
      api_key_env: DEEPSEEK_API_KEY
      use_responses_api: false
      models:
        deepseek-v4-flash:
          model: deepseek-v4-flash
        deepseek-chat:
          model: deepseek-chat
        deepseek-reasoner:
          model: deepseek-reasoner
    openai:
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      use_responses_api: true
      models:
        gpt-5.5:
          model: gpt-5.5
        gpt-5-codex:
          model: gpt-5-codex
    zhipu:
      base_url: https://open.bigmodel.cn/api/paas/v4/
      api_key_env: ZHIPUAI_API_KEY
      models:
        glm-4.7:
          model: glm-4.7
  anthropic_base_url: https://api.deepseek.com/v1
embedding:
  provider: qwen
  model: text-embedding-v4
  dimension: 1024
  api_key: ""
  api_key_env: QWEN_API_KEY
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
storage:
  backend: pgvector
  pgvector:
    database_url: postgresql+asyncpg://postgres:1234@127.0.0.1:5432/trusted_qa
    embedding_dim: 1024
  local_dev:
    enabled: false
    database_url: sqlite:///database/local_dev.db
agent:
  orchestration: trusted_qa_workflow
  max_iterations: 6
  skill_trace_enabled: true
  default_skill: fact_lookup
skills:
  enabled:
    - fact_lookup
    - table_qa
    - citation_locate
    - summarization
    - report_generation
    - multi_doc_compare
  clarify_before_skill: true
  fallback_skill: fact_lookup
pdf:
  parser: mineru
  max_pages_per_task: 200
  mineru_remote_enabled: true
chunking:
  chunk_size_tokens: 1024
  chunk_overlap_tokens: 200
  max_chunk_size: 7000
  heading_max_level: 2
retrieval:
  strategy: hybrid
  top_k: 5
  expand_query_num: 4
  max_concurrency: 6
  query_timeout_seconds: 20
  table_evidence_quota: 2
  hybrid_dense_pool_factor: 4
  hybrid_sparse_pool_factor: 6
  sparse_algorithm: bm25
  hybrid_sparse_scan_limit: 3000
  hybrid_sparse_min_score: 0.05
  bm25_k1: 1.5
  bm25_b: 0.75
  bm25_min_score: 0.05
  hybrid_table_quota: 2
  hybrid_table_score_floor: 0.25
reranker:
  dense_weight: 0.5
  bm25_weight: 0.35
  metadata_boost_weight: 0.1
  table_boost_weight: 0.05
  top_n_factor: 4
  near_duplicate_threshold: 0.9
  cross_encoder_enabled: true
  cross_encoder_model: BAAI/bge-reranker-base
  cross_encoder_candidate_pool: 20
  cross_encoder_batch_size: 8
  cross_encoder_max_length: 512
  cross_encoder_local_files_only: false
  cross_encoder_preload_on_startup: true
  cross_encoder_load_on_request: true
cache:
  enabled: true
  ttl_seconds: 3600
  max_items: 5000
  embedding_cache_enabled: true
  retrieval_cache_enabled: true
  document_parse_cache_enabled: true
guardrails:
  evidence_min_docs: 2
  evidence_min_top_score: 0.45
  evidence_min_avg_score: 0.3
  retry_limit: 1
  refuse_on_low_evidence: true
api_keys:
  openai_api_key: ''
  deepseek_api_key: ''
  qwen_api_key: ""
  zhipuai_api_key: ''
  anthropic_api_key: ''
  mineru_api_key: ""
  mineru_api_key_env: MinerU_API_KEY
vector:
  backend: pgvector
  pgvector_database_url: postgresql+asyncpg://postgres:1234@127.0.0.1:5432/trusted_qa
  pgvector_embedding_dim: 1024
